spring:
  application:
    name: backend

  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/db}
    username: ${APP_DB_USERNAME:postgres}
    password: ${APP_DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api/v1

logging:
  level:
    org:
      hibernate:
        type: trace
    sql: trace
    web: DEBUG

springdoc:
  paths-to-match: /api/v1/**
  swagger-ui:
    disable-swagger-default-url: true

application:
  admin:
    password: ${APP_ADMIN_PASSWORD}
  jwt:
    signature:
      secret: ${APP_SIGNATURE_SECRET}